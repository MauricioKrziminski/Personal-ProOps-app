# Configuração das Edge Functions do Personal ProOps app.
# O webhook do WhatsApp NÃO recebe JWT (a Meta chama direto) — a segurança dele
# é a verificação HMAC (X-Hub-Signature-256) + verify_token feita no código.
# Todas as outras funções exigem JWT.

project_id = "app-proops"

[functions.whatsapp-webhook]
verify_jwt = false

[functions.process-jobs]
verify_jwt = true

[functions.send-reminders]
verify_jwt = true

# Send SMS Auth Hook do Supabase (entrega OTP via WhatsApp). Sem JWT — a
# segurança é a assinatura standardwebhooks (SEND_SMS_HOOK_SECRET).
[functions.wa-send-otp]
verify_jwt = false
